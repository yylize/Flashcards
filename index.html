    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Flashcards de Estudo</h1>

    <div class="container">

        <div class="card" onclick="virar(this)">
            <div class="frente">
                O que é HTML?
            </div>
            <div class="verso">
                HTML é a linguagem usada para estruturar páginas da web.
            </div>
        </div>

        <div class="card" onclick="virar(this)">
            <div class="frente">
                O que é CSS?
            </div>
            <div class="verso">
                CSS é utilizado para estilizar páginas da web.
            </div>
        </div>

        <div class="card" onclick="virar(this)">
            <div class="frente">
                O que faz o JavaScript?
            </div>
            <div class="verso">
                Adiciona interatividade às páginas.
            </div>
        </div>

    </div>

    <script src="script.js"></script>
